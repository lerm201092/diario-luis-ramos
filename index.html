<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Diario - Luis Ramos</title>

  <script src="https://apis.google.com/js/api.js"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
      background: #f8f9fa;
      margin: 0;
    }

    h1 {
      text-align: center;
      font-size: 1.5em;
    }

    input, textarea, button {
      padding: 10px;
      font-size: 16px;
      box-sizing: border-box;
    }

    textarea {
      width: 100%;
      height: 150px;
      margin-top: 10px;
    }

    .fila {
      display: flex;
      gap: 10px;
      margin-bottom: 10px;
    }

    .fila input, .fila button {
      flex: 1;
    }

    table {
      margin-top: 20px;
      border-collapse: collapse;
    }

    table th, table td {
      padding: 8px;
      text-align: center;
    }

    #overlay {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background-color: rgba(0,0,0,0.5);
      display: none;
      justify-content: center;
      align-items: center;
      color: white;
      font-size: 20px;
    }
  </style>
</head>

<body>

<div id="overlay">⏳ Procesando...</div>

<h1>📘 Diario - Luis Ramos v2</h1>

<button id="loginBtn">🔐 Iniciar sesión</button>
<div id="userInfo"></div>

<label>Fecha:</label>
<div class="fila">
  <input type="date" id="fecha">
  <button onclick="ponerHoy()">Hoy</button>
</div>

<label>Hora inicio y fin:</label>
<div class="fila">
  <input type="time" id="horaInicio" step="600">
  <input type="time" id="horaFin" step="600">
</div>

<label>¿Qué hiciste hoy?</label>
<textarea id="contenido"></textarea>

<div class="fila">
  <button onclick="guardarEnDrive()">💾 Guardar</button>
  <button onclick="abrirDesdeDrive()">📂 Abrir</button>
  <button onclick="listarRegistros()">📋 Ver registros</button>
</div>

<h3>Registros</h3>
<table border="1" width="100%">
  <thead>
    <tr>
      <th>Fecha</th>
      <th>Inicio</th>
      <th>Fin</th>
      <th>Acción</th>
    </tr>
  </thead>
  <tbody id="tablaRegistros"></tbody>
</table>

<script>
const CLIENT_ID = '286443566980-c7oscu6vh6vlrp1se3g2eog1psbh5ugt.apps.googleusercontent.com';
const SCOPES = 'https://www.googleapis.com/auth/drive';

let tokenClient, folderId = null;

function mostrarOverlay(x){
  document.getElementById('overlay').style.display = x ? 'flex' : 'none';
}

function gapiLoaded(){
  gapi.load('client', initializeGapiClient);
}

async function initializeGapiClient(){
  await gapi.client.init({
    discoveryDocs: ["https://www.googleapis.com/discovery/v1/apis/drive/v3/rest"]
  });

  tokenClient = google.accounts.oauth2.initTokenClient({
    client_id: CLIENT_ID,
    scope: SCOPES,
    callback: async () => {
      document.getElementById('userInfo').innerText = 'Sesión iniciada';
      await buscarOCrearCarpeta();
    }
  });
}

document.getElementById('loginBtn').onclick = () => {
  tokenClient.requestAccessToken();
};

function ponerHoy(){
  const hoy = new Date().toLocaleDateString('sv-SE');
  document.getElementById('fecha').value = hoy;
}

async function buscarOCrearCarpeta(){
  const res = await gapi.client.drive.files.list({
    q: "name='AMERIKA' and mimeType='application/vnd.google-apps.folder' and trashed=false",
    fields: "files(id)"
  });

  if(res.result.files.length > 0){
    folderId = res.result.files[0].id;
  } else {
    const folder = await gapi.client.drive.files.create({
      resource: { name: 'AMERIKA', mimeType: 'application/vnd.google-apps.folder' },
      fields: 'id'
    });
    folderId = folder.result.id;
  }
}

async function guardarEnDrive(){
  const fecha = document.getElementById('fecha').value;
  const inicio = document.getElementById('horaInicio').value;
  const fin = document.getElementById('horaFin').value;
  const texto = document.getElementById('contenido').value;

  if(!fecha || !inicio || !fin || !texto){
    return alert('Completa todo');
  }

  mostrarOverlay(true);

  const contenido = `Inicio:${inicio}|Fin:${fin}\n${texto}`;
  const filename = `diario_${fecha}.txt`;

  const file = new Blob([contenido], { type: 'text/plain' });
  const form = new FormData();

  form.append("metadata", new Blob([JSON.stringify({
    name: filename,
    parents: [folderId]
  })], { type: "application/json" }));

  form.append("file", file);

  await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart', {
    method: 'POST',
    headers: new Headers({
      'Authorization': 'Bearer ' + gapi.auth.getToken().access_token
    }),
    body: form
  });

  alert('Guardado');
  mostrarOverlay(false);
}

async function abrirDesdeDrive(){
  const fecha = document.getElementById('fecha').value;
  const filename = `diario_${fecha}.txt`;

  const res = await gapi.client.drive.files.list({
    q: `name='${filename}' and trashed=false and '${folderId}' in parents`,
    fields: "files(id)"
  });

  if(res.result.files.length === 0){
    return alert('No existe');
  }

  const file = await gapi.client.drive.files.get({
    fileId: res.result.files[0].id,
    alt: 'media'
  });

  const lineas = file.body.split('\n');

  if(lineas[0].includes('Inicio')){
    const partes = lineas[0].split('|');
    document.getElementById('horaInicio').value = partes[0].replace('Inicio:','');
    document.getElementById('horaFin').value = partes[1].replace('Fin:','');
    document.getElementById('contenido').value = lineas.slice(1).join('\n');
  }
}

async function listarRegistros(){
  const res = await gapi.client.drive.files.list({
    q: `'${folderId}' in parents and trashed=false`,
    fields: "files(id,name)"
  });

  const tabla = document.getElementById('tablaRegistros');
  tabla.innerHTML = '';

  for(const file of res.result.files){
    if(!file.name.startsWith('diario_')) continue;

    const fecha = file.name.replace('diario_','').replace('.txt','');

    const contenido = await gapi.client.drive.files.get({
      fileId: file.id,
      alt: 'media'
    });

    const linea = contenido.body.split('\n')[0];

    let inicio='', fin='';
    if(linea.includes('Inicio')){
      const partes = linea.split('|');
      inicio = partes[0].replace('Inicio:','');
      fin = partes[1].replace('Fin:','');
    }

    tabla.innerHTML += `
      <tr>
        <td>${fecha}</td>
        <td>${inicio}</td>
        <td>${fin}</td>
        <td><button onclick="cargar('${fecha}')">Abrir</button></td>
      </tr>
    `;
  }
}

function cargar(fecha){
  document.getElementById('fecha').value = fecha;
  abrirDesdeDrive();
}

window.onload = gapiLoaded;
</script>

<script src="https://accounts.google.com/gsi/client" async defer></script>

</body>
</html>
